# ====================================
# NonoBot — Docker Compose
# ====================================
# Usage:
#   cp .env.example .env      # Configure API keys
#   docker compose up -d      # Start in background
#   docker compose logs -f    # Follow logs
#   docker compose down       # Stop all

services:
  # ─── NonoBot Gateway (API + Agent + Channels) ───
  nonobot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nonobot-gateway
    restart: unless-stopped
    ports:
      - "${NONOBOT_PORT:-18790}:${NONOBOT_PORT:-18790}"
    volumes:
      # Persist config + data + sandbox
      - nonobot-data:/home/nonobot/.nanobot
      # Mount config.json from host (optional)
      # - ./config.json:/home/nonobot/.nanobot/config.json:ro
    environment:
      - NONOBOT_PORT=${NONOBOT_PORT:-18790}
      - NONOBOT_HOST=${NONOBOT_HOST:-0.0.0.0}
      - DATABASE_URL=${DATABASE_URL:-}
      - JWT_SECRET=${JWT_SECRET:-}
      # LLM Provider keys (pass through from .env)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${NONOBOT_PORT:-18790}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Nginx Reverse Proxy (optional, uncomment to enable) ───
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: nonobot-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     # For TLS:
  #     # - ${SSL_CERT_PATH}:/etc/nginx/ssl/fullchain.pem:ro
  #     # - ${SSL_KEY_PATH}:/etc/nginx/ssl/privkey.pem:ro
  #   depends_on:
  #     nonobot:
  #       condition: service_healthy

volumes:
  nonobot-data:
    driver: local
