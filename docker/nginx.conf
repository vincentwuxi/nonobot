# NonoBot — Nginx Reverse Proxy Configuration
#
# Features:
#   - HTTP → HTTPS redirect
#   - TLS termination (Let's Encrypt certs)
#   - WebSocket proxy for /ws
#   - Static asset caching (1 week)
#   - Gzip compression
#   - Security headers
#
# Usage:
#   Uncomment the nginx service in docker-compose.yml
#   Mount your SSL certs or use certbot

upstream nonobot {
    server nonobot:18790;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ─── TLS ───
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── Security Headers ───
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ─── WebSocket — /ws ───
    location /ws {
        proxy_pass http://nonobot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Static Assets — cache 1 week ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://nonobot;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Health check — no auth ───
    location /health {
        proxy_pass http://nonobot;
        access_log off;
    }

    # ─── All other requests ───
    location / {
        proxy_pass http://nonobot;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 50m;
    }
}
